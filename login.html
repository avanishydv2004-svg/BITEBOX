     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"> <!--login ke logo ka library-->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/favicon_io/favicon.ico"><!--title ka logo-->
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Dancing+Script:wght@400..700&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+AU+VIC+Guides&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Syne+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <img src="images/logo3.png" alt="logo" width="180px">
            <ul>
                <li><a href="home.html" class="active">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="bitedeals.html">Bitedeals</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-plus"></i></a></li>
                <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
            </ul>
        </nav>
     </header>
     <section class="auth-container">
        <div class="auth-box">
            <h2>Login to Bitebox</h2>
            <form>
                <input type="email" placeholder="Enter email" id="email" required>
                <div style="position: relative;">
                    <input type="password" placeholder="Enter password" id="password" required>
                    <i class="fa-solid fa-eye" onclick="togglePassword()" style="position: absolute; right: 1px; top: 20px;"></i>
                </div>
               
                <button type="button" onclick="login()">Login</button>
                <p><a href="signup.html">Forgot Password</a></p>
                <p id="error" style="color: red;"></p>
                <p>Don't have an account <a href="signup.html">Signup</a></p>
            </form>
        </div>
     </section>
</body>
</html>
