<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Dancing+Script:wght@400..700&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+AU+VIC+Guides&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Syne+Mono&display=swap" rel="stylesheet"> <!--font style link-->

<body>
    <header>
        <nav>
            <img src="images/logo3.png" alt="logo" width="180px">
            <ul>
                <li><a href="home.html" class="active">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="bitedeals.html">Bitedeals</a></li>

            </ul>
        </nav>
     </header>
     <section class="cart">
        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>
            <tbody>
                <tr>
                    <td class="item">
                        <img src="images/burger.png" alt="">
                        <div>
                            <h4>Cheesy Burger</h4>
                            <p>Juicy grilled burger</p>
                        </div>
                    </td>
                    <td>Rs 199</td>
                    <td>
                        <div class="qty-box">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                        </div>
                    </td>
                    <td>Rs199</td>
                    <td><button class="remove">X</button></td>
                </tr>
                <tr class="grand-total">
                    <td colspan="3">Grand Total</td>
                    <td>Rs 199</td>
                    <td><button>Proceed</button></td>
                </tr>
            </tbody>
        </table>
     </section>
